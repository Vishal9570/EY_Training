apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: local-webapp
  template:
    metadata:
      labels:
        app: local-webapp
    spec:
      containers:
      - name: local-webapp
        image: image1.azurecr.io/local-webapp:v1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: local-webapp-service
spec:
  type: LoadBalancer
  selector:
    app: local-webapp
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080